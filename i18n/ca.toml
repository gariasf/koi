["pp.s1.h"]
other = "Què guarda Koi"

["pp.s1.p"]
other = "Els detalls que afegeixes sobre els teus cotxes: marca i model, sobrenoms, fotos, plans i proveïdors, dades de l'assegurança, registres de combustible i despeses, recordatoris i qualsevol document que hi adjuntis. Tot s'escriu a l'emmagatzematge local del teu dispositiu i s'hi queda. Koi no té comptes d'usuari ni base de dades al núvol, així que aquesta informació mai no es puja cap a nosaltres."

["pp.s2.h"]
other = "Què recollim sobre tu"

["pp.s2.p"]
other = "Res de personal. No et demanem el nom ni el correu, no t'assignem cap identificador i no construïm cap perfil teu. No podem veure els teus cotxes, els teus costos ni com fas servir l'app."

["pp.s3.h"]
other = "Ubicació i preus de combustible"

["pp.s3.p"]
other = "Si tries veure els preus de combustible propers, Koi demana a l'iOS la teva ubicació aproximada i la fa servir per consultar preus en un servei públic de preus de combustible. La teva ubicació s'usa al teu dispositiu per a aquesta consulta i nosaltres no la desem ni la lliguem a la teva identitat. Pots desactivar-ho quan vulguis a la Configuració de l'iOS, i la resta de l'app continua funcionant sense això."

["pp.s4.h"]
other = "Tercers"

["pp.s4.p1"]
other = "Koi no inclou SDK de publicitat, rastrejadors de xarxes socials ni eines d'analítica. L'únic servei extern amb què contacta és la consulta pública de preus de combustible descrita més amunt, i només quan demanes preus. Si descarregues l'app des de l'App Store, s'apliquen les "

["pp.s4.appstore"]
other = "pràctiques de privadesa estàndard de l'App Store"

["pp.s4.p2"]
other = " a aquesta operació. Aquesta part és entre tu i Apple."

["pp.s5.h"]
other = "Còpies de seguretat i traspàs de dispositiu"

["pp.s5.p"]
other = "Com que les teves dades viuen al teu dispositiu, s'inclouen a la teva còpia de seguretat xifrada habitual de l'iPhone (iCloud o local), sota el teu control i el xifratge d'Apple, no el nostre. Si canvies de telèfon, les teves dades de Koi vénen amb aquesta còpia. Esborra l'app i les dades d'aquell dispositiu se'n van amb ella."

["pp.s6.h"]
other = "Tu tens el control"

["pp.s6.p"]
other = "Pots editar o esborrar qualsevol cotxe, registre o document dins de l'app, i pots treure-ho tot esborrant Koi del teu dispositiu. Com que nosaltres mai en tenim cap còpia, no hi ha res per demanar-nos ni res que haguem d'oblidar."

["pp.s7.h"]
other = "Infants"

["pp.s7.p"]
other = "Koi no s'adreça als infants, i no recull res de ningú de manera conscient. No hi ha cap recollida de dades, d'entrada."

