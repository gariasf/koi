["pp.s1.h"]
other = "Hva Koi lagrer"

["pp.s1.p"]
other = "Detaljene du legger til om bilene dine: merke og modell, kallenavn, bilder, planer og leverandører, forsikringsdetaljer, drivstoff- og utgiftslogger, påminnelser, og alle dokumenter du legger ved. Alt skrives til enhetens lokale lagring og blir der. Koi har ingen brukerkontoer og ingen skydatabase, så denne informasjonen lastes aldri opp til oss."

["pp.s2.h"]
other = "Hva vi samler inn om deg"

["pp.s2.p"]
other = "Ingenting personlig. Vi spør ikke om navnet eller e-posten din, vi gir deg ingen ID, og vi bygger ingen profil av deg. Vi kan ikke se bilene dine, kostnadene dine eller hvordan du bruker appen."

["pp.s3.h"]
other = "Posisjon og drivstoffpriser"

["pp.s3.p"]
other = "Hvis du velger å se drivstoffpriser i nærheten, ber Koi iOS om den omtrentlige posisjonen din og bruker den til å slå opp priser fra en offentlig drivstoffpristjeneste. Posisjonen din brukes på enheten din til den forespørselen og lagres ikke av oss eller knyttes til identiteten din. Du kan skru dette av når som helst i iOS-innstillingene, og resten av appen fungerer videre uten det."

["pp.s4.h"]
other = "Tredjeparter"

["pp.s4.p1"]
other = "Koi inneholder ingen annonse-SDK-er, sosiale medier-sporere eller analyseverktøy. Den eneste eksterne tjenesten den kontakter er det offentlige drivstoffprisoppslaget beskrevet ovenfor, og bare når du ber om priser. Hvis du laster ned appen fra App Store, gjelder Apples standard "

["pp.s4.appstore"]
other = "personvernpraksis for App Store"

["pp.s4.p2"]
other = " for den transaksjonen. Den delen er mellom deg og Apple."

["pp.s5.h"]
other = "Sikkerhetskopier og overføring mellom enheter"

["pp.s5.p"]
other = "Fordi dataene dine bor på enheten din, blir de inkludert i den vanlige krypterte iPhone-sikkerhetskopien (iCloud eller lokal), under din kontroll og Apples kryptering, ikke vår. Hvis du får en ny telefon, følger Koi-dataene dine med den sikkerhetskopien. Slett appen, og dataene på den enheten følger med."

["pp.s6.h"]
other = "Du har kontrollen"

["pp.s6.p"]
other = "Du kan redigere eller slette hvilken som helst bil, logg eller dokument inne i appen, og du kan fjerne alt ved å slette Koi fra enheten din. Siden vi aldri sitter på en kopi, finnes det ingenting å be oss om og ingenting for oss å glemme."

["pp.s7.h"]
other = "Barn"

["pp.s7.p"]
other = "Koi er ikke rettet mot barn, og den samler ikke bevisst inn noe fra noen. Det finnes ingen datainnsamling i utgangspunktet."

