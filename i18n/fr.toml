["pp.s1.h"]
other = "Ce que Koi stocke"

["pp.s1.p"]
other = "Les détails que vous ajoutez sur vos voitures : marque et modèle, surnoms, photos, plans et prestataires, informations d'assurance, journaux de carburant et de dépenses, rappels, et tout document que vous joignez. Tout cela est écrit dans le stockage local de votre appareil et y reste. Koi n'a aucun compte utilisateur ni base de données dans le cloud, donc ces informations ne nous sont jamais transmises."

["pp.s2.h"]
other = "Ce que nous recueillons sur vous"

["pp.s2.p"]
other = "Rien de personnel. Nous ne demandons ni votre nom ni votre e-mail, nous ne vous attribuons aucun identifiant, et nous ne construisons aucun profil de vous. Nous ne pouvons voir ni vos voitures, ni vos coûts, ni la façon dont vous utilisez l'application."

["pp.s3.h"]
other = "Localisation et prix du carburant"

["pp.s3.p"]
other = "Si vous choisissez de voir les prix du carburant à proximité, Koi demande à iOS votre localisation approximative et l'utilise pour consulter les prix auprès d'un service public de prix du carburant. Votre localisation est utilisée sur votre appareil pour cette requête et n'est ni enregistrée par nous ni rattachée à votre identité. Vous pouvez désactiver cela à tout moment dans les Réglages iOS, et le reste de l'application continue de fonctionner sans cela."

["pp.s4.h"]
other = "Tiers"

["pp.s4.p1"]
other = "Koi n'inclut aucun SDK publicitaire, aucun traceur de réseaux sociaux, ni outil d'analyse. Le seul service extérieur qu'il contacte est la consultation publique des prix du carburant décrite ci-dessus, et seulement lorsque vous demandez les prix. Si vous téléchargez l'application depuis l'App Store, les "

["pp.s4.appstore"]
other = "pratiques de confidentialité standard de l'App Store"

["pp.s4.p2"]
other = " d'Apple s'appliquent à cette transaction. Cette partie-là se passe entre vous et Apple."

["pp.s5.h"]
other = "Sauvegardes et transfert d'appareil"

["pp.s5.p"]
other = "Comme vos données vivent sur votre appareil, elles sont incluses dans votre sauvegarde iPhone chiffrée habituelle (iCloud ou locale), sous votre contrôle et le chiffrement d'Apple, pas le nôtre. Si vous changez de téléphone, vos données Koi arrivent avec cette sauvegarde. Supprimez l'application et les données présentes sur cet appareil partent avec elle."

["pp.s6.h"]
other = "Vous gardez la main"

["pp.s6.p"]
other = "Vous pouvez modifier ou supprimer n'importe quelle voiture, n'importe quel journal ou document dans l'application, et vous pouvez tout effacer en supprimant Koi de votre appareil. Comme nous n'en conservons jamais de copie, il n'y a rien à nous demander et rien que nous ayons à oublier."

["pp.s7.h"]
other = "Enfants"

["pp.s7.p"]
other = "Koi ne s'adresse pas aux enfants, et ne recueille sciemment rien de la part de qui que ce soit. Il n'y a aucune collecte de données au départ."

["pp.s8.h"]
other = "Modifications de cette politique"

["pp.s8.p"]
other = "Si Koi ajoute un jour une fonctionnalité qui change la façon dont les données sont traitées, nous mettrons à jour cette page et la date de « dernière mise à jour » ci-dessus avant la sortie de cette fonctionnalité. Notre intention ne changera pas : vos données restent les vôtres, sur votre appareil."

