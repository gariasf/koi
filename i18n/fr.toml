["pp.intro"]
other = "Koi est conçu pour garder vos informations privées. Tout ce que vous saisissez vit sur votre appareil. Il n'y a aucun compte, aucun serveur qui détient vos données, et rien que nous pourrions vendre même si nous le voulions."

