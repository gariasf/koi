["pp.s1.p"]
other = "Los datos que añades sobre tus coches: marca y modelo, apodos, fotos, planes y proveedores, datos del seguro, registros de carburante y gastos, recordatorios y cualquier documento que adjuntes. Todo se escribe en el almacenamiento local de tu dispositivo y se queda ahí. Koi no tiene cuentas de usuario ni base de datos en la nube, así que esta información nunca se sube hasta nosotros."

