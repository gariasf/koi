["pp.s3.h"]
other = "Ubicación y precios de carburante"

["pp.s3.p"]
other = "Si decides ver los precios de carburante cercanos, Koi le pide a iOS tu ubicación aproximada y la usa para consultar los precios de un servicio público de precios de carburante. Tu ubicación se usa en tu dispositivo para esa consulta y nosotros no la guardamos ni la asociamos a tu identidad. Puedes desactivarlo cuando quieras en los Ajustes de iOS, y el resto de la app sigue funcionando sin ello."

