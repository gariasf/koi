["pp.back"]
other = "Back to home"

["pp.eyebrow"]
other = "Privacy policy"

["pp.h1"]
other = "The short version: it stays on your phone."

["pp.intro"]
other = "Koi is built to keep your information private. Everything you put in lives on your device. There's no account, no server holding your data, and nothing we could sell even if we wanted to."

["pp.updated"]
other = "Last updated · 12 June 2026"

["pp.sum.1"]
other = "No account, no email, no sign-in"

["pp.sum.2"]
other = "Your data is stored only on your device"

["pp.sum.3"]
other = "No advertising, no trackers, no third-party analytics"

["pp.sum.4"]
other = "Location, if you allow it, is used on-device and never stored by us"

["pp.s1.h"]
other = "What Koi stores"

["pp.s1.p"]
other = "The details you add about your cars: make and model, nicknames, photos, plans and providers, insurance details, fuel and expense logs, reminders, and any documents you attach. All of it is written to your device's local storage and stays there. Koi has no user accounts and no cloud database, so this information is never uploaded to us."

["pp.s2.h"]
other = "What we collect about you"

["pp.s2.p"]
other = "Nothing personal. We don't ask for your name or email, we don't assign you an ID, and we don't build a profile of you. We can't see your cars, your costs, or how you use the app."

["pp.s3.h"]
other = "Location and fuel prices"

["pp.s3.p"]
other = "If you choose to see nearby fuel prices, Koi asks iOS for your approximate location and uses it to look up prices from a public fuel-price service. Your location is used on your device for that request and is not saved by us or attached to your identity. You can turn this off at any time in iOS Settings, and the rest of the app keeps working without it."

["pp.s4.h"]
other = "Third parties"

["pp.s4.p1"]
other = "Koi doesn't include advertising SDKs, social-media trackers, or analytics tools. The only outside service it contacts is the public fuel-price lookup described above, and only when you ask for prices. If you download the app from the App Store, Apple's standard "

["pp.s4.appstore"]
other = "App Store privacy practices"

["pp.s4.p2"]
other = " apply to that transaction. That part is between you and Apple."

["pp.s5.h"]
other = "Backups and device transfer"

["pp.s5.p"]
other = "Because your data lives on your device, it's included in your normal encrypted iPhone backup (iCloud or local), under your control and Apple's encryption, not ours. If you get a new phone, your Koi data comes across with that backup. Delete the app and the data on that device goes with it."

["pp.s6.h"]
other = "You're in control"

["pp.s6.p"]
other = "You can edit or delete any car, log, or document inside the app, and you can remove everything by deleting Koi from your device. Since we never hold a copy, there's nothing to request from us and nothing for us to forget."

["pp.s7.h"]
other = "Children"

["pp.s7.p"]
other = "Koi isn't directed at children, and it doesn't knowingly collect anything from anyone. There's no data collection to begin with."

["pp.s8.h"]
other = "Changes to this policy"

["pp.s8.p"]
other = "If Koi ever adds a feature that changes how data is handled, we'll update this page and the \"last updated\" date above before that feature ships. Our intent won't change: your data stays yours, on your device."

