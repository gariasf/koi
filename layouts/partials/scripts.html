{{- /* Progressive enhancement: contact address, language memory, carousel. Loaded at body end. */ -}}
<script>
  // Build the contact address at runtime — keeps plaintext + mailto: out of the served HTML,
  // so the JS-less harvesters that do almost all email scraping find nothing to grab.
  document.querySelectorAll("a.eml").forEach(function (a) {
    var e = a.getAttribute("data-e");
    if (!e) return;
    var addr = atob(e);
    a.setAttribute("href", "mailto:" + addr);
    if (a.hasAttribute("data-show")) a.textContent = addr;
    a.removeAttribute("data-e");
  });
</script>
<script>
  /* Remember an explicit language choice so the autodetect redirect respects it next time. */
  document.querySelectorAll(".langbar a[data-lang]").forEach(function (a) {
    a.addEventListener("click", function () { try { localStorage.setItem("koi_lang", a.dataset.lang); } catch (e) {} });
  });
</script>
{{- if .IsHome }}
<script>
/* Carousel: native scroll-snap (swipe/keyboard), plus arrows, dot indicators, and an
   auto-advance that you can pause (WCAG 2.2.2). Auto-advance is off when the OS asks to reduce
   motion. Pure progressive enhancement: with JS off the strip still scroll-snaps. */
(function () {
  document.querySelectorAll(".carousel-wrap").forEach(function (wrap) {
    var track = wrap.querySelector(".carousel");
    var slides = Array.prototype.slice.call(track.children);
    var section = wrap.closest("section");
    var dots = Array.prototype.slice.call(section.querySelectorAll(".dots button"));
    var playBtn = section.querySelector(".car-play");
    var PAUSE = (playBtn && playBtn.getAttribute("data-pause")) || "Pause";
    var PLAY = (playBtn && playBtn.getAttribute("data-play")) || "Play";
    var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    var i = 0, timer = null, playing = false;

    function go(n, smooth) {
      i = (n + slides.length) % slides.length;
      slides[i].scrollIntoView({ inline: "center", block: "nearest", behavior: smooth === false ? "auto" : "smooth" });
    }
    function sync() { dots.forEach(function (d, j) { d.setAttribute("aria-current", j === i ? "true" : "false"); }); }

    dots.forEach(function (d, j) { d.addEventListener("click", function () { go(j); }); });
    var prev = wrap.querySelector(".prev"), next = wrap.querySelector(".next");
    if (prev) prev.addEventListener("click", function () { go(i - 1); });
    if (next) next.addEventListener("click", function () { go(i + 1); });

    if ("IntersectionObserver" in window) {
      var io = new IntersectionObserver(function (es) {
        es.forEach(function (e) { if (e.isIntersecting) { i = slides.indexOf(e.target); sync(); } });
      }, { root: track, threshold: 0.6 });
      slides.forEach(function (s) { io.observe(s); });
    }

    // drag-to-swipe with the mouse (touch already pans natively via scroll-snap)
    var drag = null;
    function restoreSnap() { track.style.scrollSnapType = ""; }
    track.addEventListener("pointerdown", function (e) {
      if (e.pointerType !== "mouse") return;
      drag = { x: e.clientX, left: track.scrollLeft, moved: false };
      track.setPointerCapture(e.pointerId);
      track.classList.add("dragging");
      track.style.scrollSnapType = "none";   // free pan; we re-snap ourselves on release
    });
    track.addEventListener("pointermove", function (e) {
      if (!drag) return;
      var dx = e.clientX - drag.x;
      if (Math.abs(dx) > 3) drag.moved = true;
      track.scrollLeft = drag.left - dx;
    });
    function endDrag() {
      if (!drag) return;
      var moved = drag.moved;
      drag = null;
      track.classList.remove("dragging");
      if (!moved) { restoreSnap(); return; }   // a click, not a drag — leave it be
      // glide to whichever slide sits nearest the centre, then re-arm snapping
      var c = track.scrollLeft + track.clientWidth / 2, best = 0, bd = Infinity;
      slides.forEach(function (s, j) {
        var d = Math.abs(s.offsetLeft + s.offsetWidth / 2 - c);
        if (d < bd) { bd = d; best = j; }
      });
      go(best);   // smooth, with snap still off so it animates once instead of jumping
      if ("onscrollend" in window) track.addEventListener("scrollend", restoreSnap, { once: true });
      else setTimeout(restoreSnap, 450);
    }
    track.addEventListener("pointerup", endDrag);
    track.addEventListener("pointercancel", endDrag);
    track.addEventListener("dragstart", function (e) { e.preventDefault(); }); // kill native image ghost

    function tick() { go(i + 1); }
    function render() {
      if (!playBtn) return;
      playBtn.setAttribute("aria-pressed", playing ? "true" : "false");
      playBtn.setAttribute("aria-label", playing ? PAUSE : PLAY);
      playBtn.innerHTML = playing
        ? '<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    }
    function start() { if (reduce || timer) return; timer = setInterval(tick, 5000); playing = true; render(); }
    function stop() { if (timer) { clearInterval(timer); timer = null; } playing = false; render(); }
    if (playBtn) playBtn.addEventListener("click", function () { playing ? stop() : start(); });

    // don't auto-advance while the visitor is reading/interacting; resume after
    wrap.addEventListener("pointerenter", function () { if (timer) { clearInterval(timer); timer = null; } });
    wrap.addEventListener("pointerleave", function () { if (playing && !timer) timer = setInterval(tick, 5000); });
    wrap.addEventListener("focusin", function () { if (timer) { clearInterval(timer); timer = null; } });

    sync();
    if (!reduce) start(); else render();
  });
})();
</script>
{{- end }}
